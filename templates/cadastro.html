<h1>CADASTRE UM NOVO PRODUTO</h1>
<br>

<!-- @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@ AQUI COMEÇA O CODIGO DA TABELA @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@ -->

<form id="formulariocadastro" action="/cadastroconcluido.html" method="POST">
    <div class="input-group mb-3">
        <span class="input-group-text">Nome do item:</span>
        <input type="text" class="form-control" name="nome_item">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Quantidade:</span>
        <input type="text" class="form-control" name="qtde">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Estoque mínimo:</span>
        <input type="text" class="form-control" name="estoque_minimo">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Descrição:</span>
        <input type="text" class="form-control" name="descricao">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Preço:</span>
        <input type="text" class="form-control" name="preco">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Categoria:</span>
        <input type="text" class="form-control" name="categoria">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text">Link Foto:</span>
        <input type="text" class="form-control" name="foto">
    </div>

    <button type="submit" class="btn btn-success">Cadastrar</button>
</form>
